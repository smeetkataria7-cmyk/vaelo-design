name: Deploy to GitHub Pages

# Publishes the Vaelo app (static export) to GitHub Pages so the "published
# page" shows the real UI instead of the README.
on:
  push:
    branches:
      - claude/chat-session-e8r4p2
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve base path
        id: basepath
        # User/org pages (<name>.github.io) deploy at root; project pages at /<repo>.
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        env:
          NEXT_OUTPUT: export
          NEXT_BASE_PATH: ${{ steps.basepath.outputs.path }}
        run: pnpm build

      - name: Disable Jekyll (serve _next/*)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
